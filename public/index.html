<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Chat App</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body class="container-fluid d-flex flex-column min-vh-100" style="min-height: 100vh; height: 100vh;">
  <header class="d-flex align-items-center bg-primary text-white py-3 fs-3 fw-bold flex-shrink-0 position-relative">
    <button class="btn btn-secondary btn-sm position-absolute start-0 ms-3" type="button" data-bs-toggle="offcanvas"
      data-bs-target="#userListOffcanvas" aria-controls="userListOffcanvas">
      <span class="navbar-toggler-icon"></span> Menu
    </button>
    <span class="mx-auto">Mini Chat</span>
  </header>
  <div id="room-modal" class="modal d-flex align-items-center justify-content-center show flex-grow-1" tabindex="-1"
    style="display: flex; background: rgba(0,0,0,0.4);">
    <div class="modal-dialog">
      <div class="modal-content p-4">
        <h2 class="mb-4 fs-4 text-center">Join or Create a Chat Room</h2>
        <form id="room-form">
          <input type="text" id="room-id" class="form-control mb-2" placeholder="Room ID (leave blank to create)"
            maxlength="16">
          <input type="text" id="user-name" class="form-control mb-2" placeholder="Your Name (optional)" maxlength="24">
          <div class="d-flex gap-2 mb-2">
            <button type="submit" id="join-room" class="btn btn-primary flex-fill">Join Room</button>
            <button type="button" id="create-room" class="btn btn-outline-primary flex-fill">Create New Room</button>
          </div>
          <div id="room-error" class="text-danger mt-2" style="min-height:20px;"></div>
        </form>
      </div>
    </div>
  </div>
  <div class="container flex-grow-1 d-none flex-column p-0" id="main-content" style="min-height:0;">
    <div class="h-100 flex-nowrap">
      <div class="offcanvas offcanvas-start userlist-offcanvas" style="width: 160px;" data-bs-scroll="true"
        data-bs-backdrop="false" tabindex="-1" id="userListOffcanvas" aria-labelledby="userListOffcanvasLabel">
        <div class="offcanvas-header bg-dark text-white">
          <h5 class="offcanvas-title" id="userListOffcanvasLabel">MiniChat</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"
            aria-label="Close"></button>
        </div>
        <div class="offcanvas-header bg-dark text-white">
          <button id="share-link-btn" class="btn btn-secondary" data-bs-toggle="tooltip" data-bs-placement="top"
            title="Copy to clipboard"><span><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
              class="bi bi-share-fill" viewBox="0 0 16 16">
              <path
                d="M11 2.5a2.5 2.5 0 1 1 .603 1.628l-6.718 3.12a2.5 2.5 0 0 1 0 1.504l6.718 3.12a2.5 2.5 0 1 1-.488.876l-6.718-3.12a2.5 2.5 0 1 1 0-3.256l6.718-3.12A2.5 2.5 0 0 1 11 2.5" />
            </svg></span> Share Room</button>
        </div>
        <div class="offcanvas-body bg-dark text-white">
          <div class="border border-white rounded">
            <p class="text-center">Users</p>
            <ul id="users" class="list-unstyled m-0 p-3"></ul>
          </div>
          <div class="d-flex justify-content-center p-3 bg-dark">
            <button id="leave-room-btn" class="btn btn-danger w-100">Leave Room</button>
          </div>
        </div>
      </div>
      <main class="col bg-white d-flex flex-column p-0" style="height: 100%;">
        <div id="messages" class="flex-grow-1 p-3 overflow-auto bg-light"></div>
        <form id="chat-form" autocomplete="off" class="d-flex gap-2 p-3 border-top mt-auto"
          style="position:sticky;bottom:0;z-index:2;background:white;">
          <input id="m" class="form-control" autocomplete="off" placeholder="Type a message..." />
          <button class="btn btn-primary">Send</button>
        </form>
      </main>
    </div>
  </div>
  <footer class="bg-light text-secondary text-center py-2 fs-6 mt-auto flex-shrink-0">
    &copy; 2025 MiniChat by <a href="svidu96dev.vercel.app" class="text-secondary text-decoration-none">Svidu96</a>
    <br>
  </footer>
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const leaveBtn = document.getElementById('leave-room-btn');
      if (leaveBtn) {
        leaveBtn.addEventListener('click', function () {
          if (confirm('Are you sure you want to leave the chat room?')) {
            sessionStorage.removeItem('minichat_roomId');
            sessionStorage.removeItem('minichat_username');
            window.location.href = '/';
          }
        });
      }
    });
  </script>
</body>

</html>
