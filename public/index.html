<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Chat App</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
  <header class="app-header" style="width:100%;background:#0d6efd;color:#fff;padding:16px 0;text-align:center;font-size:1.5rem;font-weight:bold;letter-spacing:1px;">
    MiniChat
  </header>
  <div id="room-modal" class="modal">
    <div class="modal-content">
      <h2>Join or Create a Chat Room</h2>
      <form id="room-form">
        <input type="text" id="room-id" placeholder="Room ID (leave blank to create)" maxlength="16">
        <input type="text" id="user-name" placeholder="Your Name (optional)" maxlength="24" class="form-control mb-2">
        <div class="modal-actions">
          <button type="button" id="create-room">Create New Room</button>
          <button type="submit" id="join-room">Join Room</button>
        </div>
        <div id="room-error" class="error"></div>
      </form>
    </div>
  </div>
  <div class="container" style="display:none;">
    <aside class="user-list" id="user-list">
      <div class="d-flex align-items-center justify-content-between mb-2 d-md-none">
        <h3 class="mb-0">Users</h3>
        <button class="btn btn-outline-secondary btn-sm ms-2" id="toggle-users" type="button" aria-label="Toggle user list">
          <span class="navbar-toggler-icon"></span>
        </button>
      </div>
      <h3 class="d-none d-md-block">Users</h3>
      <ul id="users"></ul>
    </aside>
    <main class="chat-area">
      <div id="messages" class="messages"></div>
      <form id="chat-form" autocomplete="off">
        <input id="m" autocomplete="off" placeholder="Type a message..." />
        <button>Send</button>
      </form>
    </main>
  </div>
  <footer class="app-footer" style="width:100%;background:#f8f9fa;color:#6c757d;text-align:center;padding:12px 0;font-size:1em;position:fixed;bottom:0;left:0;">
    &copy; 2025 MiniChat
  </footer>
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="script.js"></script>
</body>
</html>
